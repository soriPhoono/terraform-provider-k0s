name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        run: CGO_ENABLED=0 go build -o terraform-provider-k0s
      - name: Vet
        run: CGO_ENABLED=0 go vet ./...
      - name: Unit tests
        run: CGO_ENABLED=0 go test ./internal/provider/... -count=1 -run '^Test[^A]'
      - name: Acceptance tests
        run: TF_ACC=1 CGO_ENABLED=0 go test ./internal/provider/... -count=1 -timeout 20m
